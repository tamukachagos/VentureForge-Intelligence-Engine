services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: research
      POSTGRES_PASSWORD: research
      POSTGRES_DB: research_stack
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U research -d research_stack"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--save", "", "--appendonly", "no"]

  api:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgresql://research:research@postgres:5432/research_stack
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    ports:
      - "8000:8000"
    command: >
      sh -c "python -m ai_research_stack.cli init-db &&
             uvicorn ai_research_stack.api:app --host 0.0.0.0 --port 8000"

  worker:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgresql://research:research@postgres:5432/research_stack
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    command: >
      sh -c "python -m ai_research_stack.cli init-db &&
             python -m ai_research_stack.worker --worker-id worker-1"

  scheduler:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgresql://research:research@postgres:5432/research_stack
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    command: >
      sh -c "python -m ai_research_stack.cli init-db &&
             python -m ai_research_stack.scheduler --interval-seconds 300"

  slack-socket:
    build: .
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://research:research@postgres:5432/research_stack
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    command: >
      sh -c "python -m ai_research_stack.cli init-db &&
             python -m ai_research_stack.slack_socket_mode"

volumes:
  postgres-data:
